<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沉浸式相册展览馆</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;height:100vh;width:100vw;font-family:'Noto Serif SC','Playfair Display',serif;color:#f5f0e8}
canvas{display:block}

#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border:1.5px solid rgba(201,169,110,.5);border-radius:50%;pointer-events:none;z-index:200;transition:all .2s}
#crosshair.hit{width:14px;height:14px;border-color:rgba(201,169,110,.9);box-shadow:0 0 8px rgba(201,169,110,.3)}

#loader{position:fixed;inset:0;background:#060606;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s}
#loader.fade{opacity:0;pointer-events:none}
#loader h1{font-family:'Playfair Display',serif;font-size:3rem;letter-spacing:.5em;color:#c9a96e;text-transform:uppercase;animation:b 2s ease-in-out infinite}
#loader p{margin-top:1rem;font-size:.8rem;letter-spacing:.3em;color:#8a7040}
@keyframes b{0%,100%{opacity:.3}50%{opacity:1}}

#overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;cursor:pointer}
#overlay.hidden{display:none}
#overlay .inner{text-align:center}
#overlay h2{font-family:'Playfair Display',serif;font-size:2rem;color:#c9a96e;letter-spacing:.3em}
#overlay p{margin-top:1rem;font-size:.75rem;color:#8a7040;letter-spacing:.15em}
#overlay .keys{margin-top:2rem;font-size:.65rem;color:rgba(201,169,110,.4);letter-spacing:.1em;line-height:2}

#hud{position:fixed;top:0;left:0;right:0;padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:flex-start;z-index:100;pointer-events:none;opacity:0;transition:opacity .5s}
#hud.show{opacity:1}
#hud .logo{font-family:'Playfair Display',serif;font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;color:#8a7040}
.room-label{text-align:right}
.room-label h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:#c9a96e}
.room-label p{font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:#8a7040;margin-top:.2rem}

#photo-popup{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;backdrop-filter:blur(10px)}
#photo-popup.open{opacity:1;pointer-events:all}
#photo-popup canvas{max-width:50vw;max-height:50vh;border:2px solid #8a7040;box-shadow:0 0 40px rgba(201,169,110,.1)}
.pp-info{position:absolute;bottom:3rem;text-align:center}
.pp-info h4{font-family:'Playfair Display',serif;font-size:1.3rem;color:#c9a96e}
.pp-info p{font-size:.65rem;color:#8a7040;margin-top:.4rem;letter-spacing:.15em}
.pp-close{position:absolute;top:1.5rem;right:2rem;font-size:1.3rem;color:#8a7040;cursor:pointer;z-index:610}
.pp-close:hover{color:#c9a96e}

#minimap{position:fixed;bottom:1.5rem;right:1.5rem;width:190px;height:170px;background:rgba(0,0,0,.5);border:1px solid rgba(201,169,110,.15);z-index:100;pointer-events:none}
#minimap canvas{width:100%;height:100%}
</style>
</head>

<div id="loader"><h1>Gallery</h1><p>点击进入展览馆</p></div>

<div id="overlay">
  <div class="inner">
    <h2>ENTER</h2>
    <p>点击任意位置进入展览馆</p>
    <div class="keys">
      W / ↑ — 前进 &nbsp;&nbsp; S / ↓ — 后退<br>
      A / ← — 左移 &nbsp;&nbsp; D / → — 右移<br>
      按住鼠标拖动 — 环顾四周<br>
      点击画框 — 查看详情
    </div>
  </div>
</div>

<div id="crosshair"></div>

<div id="hud">

  <div class="room-label"><h3 id="rl-name">大厅</h3><p id="rl-sub">The Grand Hall</p></div>

const ROOM_PLAN = [
  {x:0,   z:-5},    // central hall
  {x:-17, z:-5},    // west gallery
  {x:17,  z:-5},    // east gallery
  {x:0,   z:-17.5}, // north gallery
  {x:13,  z:-22.5}, // turned side corridor gallery
];

const CONNECTIONS = [
  {a:0, b:1, sideA:'left',  sideB:'right', offsetA:0, offsetB:0},
  {a:0, b:2, sideA:'right', sideB:'left',  offsetA:0, offsetB:0},
  {a:0, b:3, sideA:'back',  sideB:'front', offsetA:0, offsetB:0},
  {a:3, b:4, sideA:'right', sideB:'left',  offsetA:0, offsetB:5},
];

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060606);
scene.fog = new THREE.Fog(0x060606, 15, 35);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 50);
camera.position.set(0, 1.6, -2);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.15;
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.prepend(renderer.domElement);

// Hemisphere light (always on, soft ambient)
const hemiLight = new THREE.HemisphereLight(0xffeedd, 0x222233, 0.72);
scene.add(hemiLight);
scene.add(new THREE.AmbientLight(0xfff2dc, 0.16));

// ============ GENERATE ART TEXTURE ============
function makeArtTex(h, s, title) {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(256,256,0,256,256,360);
  g.addColorStop(0, `hsl(${h},${s}%,30%)`);
  g.addColorStop(0.5, `hsl(${(h+20)%360},${s*.8}%,16%)`);
  g.addColorStop(1, `hsl(${(h+40)%360},${s*.6}%,7%)`);
  ctx.fillStyle = g; ctx.fillRect(0,0,512,512);
  for(let i=0;i<8;i++){
    ctx.beginPath(); ctx.moveTo(Math.random()*512,Math.random()*512);
    for(let j=0;j<4;j++) ctx.bezierCurveTo(Math.random()*512,Math.random()*512,Math.random()*512,Math.random()*512,Math.random()*512,Math.random()*512);
    ctx.strokeStyle=`hsla(${(h+i*45)%360},${s}%,55%,${.05+Math.random()*.06})`; ctx.lineWidth=2+Math.random()*5; ctx.stroke();
  }
  for(let i=0;i<5;i++){
    const x=Math.random()*512,y=Math.random()*512,r=30+Math.random()*100;
    const og=ctx.createRadialGradient(x,y,0,x,y,r);
    og.addColorStop(0,`hsla(${(h+i*55)%360},${s}%,60%,${.08+Math.random()*.1})`);
    og.addColorStop(1,`hsla(${(h+i*55)%360},${s}%,35%,0)`);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=og;ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.font='bold 28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(title,256,256);
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

function makeCeilingTex(baseHex) {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');
  const base = `#${baseHex.toString(16).padStart(6, '0')}`;
  ctx.fillStyle = base;
  ctx.fillRect(0,0,512,512);
  ctx.fillStyle = 'rgba(255,255,255,.04)';
  for (let y = 0; y < 512; y += 64) {
    for (let x = 0; x < 512; x += 128) {
      ctx.fillRect(x + 6, y + 6, 116, 52);
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,.13)';
  ctx.lineWidth = 2;
  for (let x = 0; x <= 512; x += 64) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,512); ctx.stroke(); }
  for (let y = 0; y <= 512; y += 64) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(512,y); ctx.stroke(); }
  ctx.fillStyle = 'rgba(0,0,0,.22)';
  for (let i = 0; i < 7; i++) {
    const x = 28 + (i * 71) % 430;
    const y = 34 + (i * 97) % 420;
    ctx.fillRect(x, y, 74, 18);
    ctx.strokeStyle = 'rgba(255,255,255,.08)';
    for (let k = 0; k < 5; k++) {
      ctx.beginPath(); ctx.moveTo(x + 8 + k * 13, y + 3); ctx.lineTo(x + 8 + k * 13, y + 15); ctx.stroke();
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

function makePlaqueTex(title) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 160;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(12,12,10,.92)';
  ctx.fillRect(0,0,512,160);
  ctx.strokeStyle = 'rgba(201,169,110,.75)';
  ctx.lineWidth = 8;
  ctx.strokeRect(8,8,496,144);
  ctx.fillStyle = 'rgba(230,214,176,.95)';
  ctx.font = 'bold 42px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(title,256,78);
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

function makeSignTex(lines) {
  const c = document.createElement('canvas');
  c.width = 768; c.height = 320;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(8,8,7,.95)';
  ctx.fillRect(0,0,768,320);
  ctx.strokeStyle = 'rgba(201,169,110,.82)';
  ctx.lineWidth = 10;
  ctx.strokeRect(10,10,748,300);
  ctx.fillStyle = 'rgba(235,222,190,.95)';
  ctx.font = 'bold 42px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  lines.forEach((line, i) => ctx.fillText(line, 384, 82 + i * 78));
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

// ============ SHARED TEXTURES ============
const sharedTextures = [
  makeArtTex(40, 30, '序·光'),
  makeArtTex(220, 40, '序·影'),

const wallMatShared = new THREE.MeshStandardMaterial({roughness:.9, metalness:0, side:THREE.DoubleSide});
const sideMatShared = new THREE.MeshStandardMaterial({roughness:.9, metalness:0, side:THREE.DoubleSide});
const floorMatShared = new THREE.MeshStandardMaterial({roughness:.85, metalness:.05});
const frameMatShared = new THREE.MeshStandardMaterial({color:0x8a7040, metalness:.5, roughness:.3});
const trimMatShared = new THREE.MeshStandardMaterial({color:0x4d4030, metalness:.25, roughness:.45});
const metalDarkMat = new THREE.MeshStandardMaterial({color:0x080807, metalness:.55, roughness:.35});
const warmLightMat = new THREE.MeshStandardMaterial({color:0xfff0c8, emissive:0xffd486, emissiveIntensity:1.6, roughness:.2});
const glassMat = new THREE.MeshStandardMaterial({color:0xd8ecff, transparent:true, opacity:.2, metalness:0, roughness:.05});
const woodMat = new THREE.MeshStandardMaterial({color:0x4a3425, roughness:.55, metalness:.08});
const leafMat = new THREE.MeshStandardMaterial({color:0x244629, roughness:.7, metalness:0});
const potMat = new THREE.MeshStandardMaterial({color:0x2a2420, roughness:.7, metalness:.1});

// ============ BUILD ROOMS ============

const roomGroups = [];
const roomRects = [];
const corridorRects = [];
let currentRoomIdx = 0;
const DOOR_W = 2.4, DOOR_H = 3.2;
const CORRIDOR_W = DOOR_W + 1.1;
const DOOR_CLEARANCE = 0.12;

function setShadow(mesh, cast=true, receive=true) {
  mesh.castShadow = cast;
  mesh.receiveShadow = receive;
  return mesh;
}

function roomBounds(i) {
  const rm = ROOMS[i], p = ROOM_PLAN[i];
  return {
    minX:p.x - rm.w/2, maxX:p.x + rm.w/2,
    minZ:p.z - rm.d/2, maxZ:p.z + rm.d/2,
  };
}

const roomZRanges = ROOM_PLAN.map((p, i) => {
  const b = roomBounds(i);
  return {frontZ:b.maxZ, backZ:b.minZ, centerZ:p.z, leftX:b.minX, rightX:b.maxX, centerX:p.x};
});

const roomDoors = ROOMS.map(() => ({front:[], back:[], left:[], right:[]}));
CONNECTIONS.forEach(c => {
  roomDoors[c.a][c.sideA].push(c.offsetA);
  roomDoors[c.b][c.sideB].push(c.offsetB);
});

function addWallPanel(group, side, offset, length, y, height, w, d, material) {
  if (length <= 0.01 || height <= 0.01) return;
  const panel = setShadow(new THREE.Mesh(new THREE.PlaneGeometry(length, height), material));
  if (side === 'front' || side === 'back') {
    panel.position.set(offset, y, side === 'front' ? d/2 : -d/2);
    panel.rotation.y = side === 'front' ? Math.PI : 0;
  } else {
    panel.position.set(side === 'right' ? w/2 : -w/2, y, offset);
    panel.rotation.y = side === 'left' ? Math.PI/2 : -Math.PI/2;
  }
  group.add(panel);
}

function addDoorTrim(group, side, offset, w, d) {
  const normal = side === 'front' ? -1 : side === 'back' ? 1 : side === 'right' ? -1 : 1;
  const postH = DOOR_H;
  const TRIM_OFFSET = .14;
  if (side === 'front' || side === 'back') {
    const z = (side === 'front' ? d/2 : -d/2) + normal * TRIM_OFFSET;
    [-1, 1].forEach(s => {
      const post = setShadow(new THREE.Mesh(new THREE.BoxGeometry(.12, postH, .16), trimMatShared));
      post.position.set(offset + s * DOOR_W/2, postH/2, z);
      group.add(post);
    });
    const lintel = setShadow(new THREE.Mesh(new THREE.BoxGeometry(DOOR_W + .26, .16, .16), trimMatShared));
    lintel.position.set(offset, DOOR_H + .08, z);
    group.add(lintel);
  } else {
    const x = (side === 'right' ? w/2 : -w/2) + normal * TRIM_OFFSET;
    [-1, 1].forEach(s => {
      const post = setShadow(new THREE.Mesh(new THREE.BoxGeometry(.16, postH, .12), trimMatShared));
      post.position.set(x, postH/2, offset + s * DOOR_W/2);
      group.add(post);
    });
    const lintel = setShadow(new THREE.Mesh(new THREE.BoxGeometry(.16, .16, DOOR_W + .26), trimMatShared));
    lintel.position.set(x, DOOR_H + .08, offset);
    group.add(lintel);
  }
}

function addWallWithDoors(group, side, w, h, d, material, doorOffsets) {
  const wallLen = (side === 'front' || side === 'back') ? w : d;
  const half = wallLen / 2;
  const intervals = doorOffsets.map(o => ({
    start:Math.max(-half, o - DOOR_W/2 - DOOR_CLEARANCE),
    end:Math.min(half, o + DOOR_W/2 + DOOR_CLEARANCE),
    center:o,
  })).sort((a,b) => a.start - b.start);
  let cursor = -half;
  intervals.forEach(int => {
    addWallPanel(group, side, (cursor + int.start)/2, int.start - cursor, h/2, h, w, d, material);
    const aboveH = h - DOOR_H;
    addWallPanel(group, side, int.center, int.end - int.start, DOOR_H + aboveH/2, aboveH, w, d, material);
    addDoorTrim(group, side, int.center, w, d);
    cursor = int.end;
  });
  addWallPanel(group, side, (cursor + half)/2, half - cursor, h/2, h, w, d, material);
}

function getDoorWorld(roomIdx, side, offset) {
  const rm = ROOMS[roomIdx], p = ROOM_PLAN[roomIdx];
  if (side === 'front') return {x:p.x + offset, z:p.z + rm.d/2};
  if (side === 'back') return {x:p.x + offset, z:p.z - rm.d/2};
  if (side === 'left') return {x:p.x - rm.w/2, z:p.z + offset};
  return {x:p.x + rm.w/2, z:p.z + offset};
}

function addCorridor(conn) {
  const a = getDoorWorld(conn.a, conn.sideA, conn.offsetA);
  const b = getDoorWorld(conn.b, conn.sideB, conn.offsetB);
  const group = new THREE.Group();
  const h = Math.min(ROOMS[conn.a].h, ROOMS[conn.b].h);
  const floorMat = floorMatShared.clone(); floorMat.color.set(0x151411);
  const wallMat = sideMatShared.clone(); wallMat.color.set(0x171614);
  const ceilTex = makeCeilingTex(0x4f4b43); ceilTex.repeat.set(1.2, 1.2);
  const ceilMat = new THREE.MeshStandardMaterial({map:ceilTex, color:0xffffff, emissive:0x2a251c, emissiveIntensity:.24, roughness:.92, metalness:0, side:THREE.DoubleSide});

  // Inset floor/ceiling so their edges don't share a line with the room
  // walls and the room floor/ceiling at z=±d/2 (avoids z-fighting that
  // makes the corridor texture flicker through the door lintel).
  const inset = 0.04;
  const yEps = 0.005;
  if (Math.abs(a.x - b.x) < .01) {
    const fullLen = Math.abs(a.z - b.z);
    const len = Math.max(0.01, fullLen - 2 * inset);
    const zc = (a.z + b.z) / 2;
    const x = a.x;
    corridorRects.push({minX:x-CORRIDOR_W/2, maxX:x+CORRIDOR_W/2, minZ:Math.min(a.z,b.z), maxZ:Math.max(a.z,b.z), axis:'z'});
    const floor = setShadow(new THREE.Mesh(new THREE.PlaneGeometry(CORRIDOR_W, len), floorMat), false, true);
    floor.rotation.x = -Math.PI/2; floor.position.set(x, yEps, zc); group.add(floor);
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(CORRIDOR_W, len), ceilMat);
    ceil.rotation.x = Math.PI/2; ceil.position.set(x, h - yEps, zc); group.add(ceil);
    [-1,1].forEach(s => {
      const wall = setShadow(new THREE.Mesh(new THREE.PlaneGeometry(fullLen, h), wallMat));
      wall.position.set(x + s*CORRIDOR_W/2, h/2, zc);
      wall.rotation.y = s < 0 ? Math.PI/2 : -Math.PI/2;
      group.add(wall);
    });
  } else {
    const fullLen = Math.abs(a.x - b.x);
    const len = Math.max(0.01, fullLen - 2 * inset);
    const xc = (a.x + b.x) / 2;
    const z = a.z;
    corridorRects.push({minX:Math.min(a.x,b.x), maxX:Math.max(a.x,b.x), minZ:z-CORRIDOR_W/2, maxZ:z+CORRIDOR_W/2, axis:'x'});
    const floor = setShadow(new THREE.Mesh(new THREE.PlaneGeometry(len, CORRIDOR_W), floorMat), false, true);
    floor.rotation.x = -Math.PI/2; floor.position.set(xc, yEps, z); group.add(floor);
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(len, CORRIDOR_W), ceilMat);
    ceil.rotation.x = Math.PI/2; ceil.position.set(xc, h - yEps, z); group.add(ceil);
    [-1,1].forEach(s => {
      const wall = setShadow(new THREE.Mesh(new THREE.PlaneGeometry(fullLen, h), wallMat));
      wall.position.set(xc, h/2, z + s*CORRIDOR_W/2);
      wall.rotation.y = s < 0 ? 0 : Math.PI;
      group.add(wall);
    });
  }
  const rail = new THREE.Mesh(new THREE.BoxGeometry(Math.max(.1, Math.abs(a.x-b.x)) + .1, .06, Math.max(.1, Math.abs(a.z-b.z)) + .1), metalDarkMat);
  rail.position.set((a.x+b.x)/2, h-.12, (a.z+b.z)/2);
  group.add(rail);
  const glow = new THREE.PointLight(0xffdf9a, .75, 8, 1.4);
  glow.position.set((a.x+b.x)/2, h-.45, (a.z+b.z)/2);
  group.add(glow);
  scene.add(group);
}

// ============ COLLISION ============
function canMoveTo(pos) {
  const margin = 0.3;
  for (const r of roomRects) {
    if (pos.x > r.minX + margin && pos.x < r.maxX - margin &&
        pos.z > r.minZ + margin && pos.z < r.maxZ - margin) return true;
  }
  for (const r of corridorRects) {
    const alongX = r.axis === 'x';
    const minX = r.minX + (alongX ? -margin : margin);
    const maxX = r.maxX + (alongX ? margin : -margin);
    const minZ = r.minZ + (alongX ? margin : -margin);
    const maxZ = r.maxZ + (alongX ? -margin : margin);
    if (pos.x > minX && pos.x < maxX && pos.z > minZ && pos.z < maxZ) return true;
  }
  return false;
}

// ============ MINIMAP ============
const mmCanvas = document.getElementById('mm-cv');
const mmCtx = mmCanvas.getContext('2d');
function drawMinimap() {
  const mw = mmCanvas.width, mh = mmCanvas.height;
  mmCtx.clearRect(0,0,mw,mh);
  mmCtx.fillStyle = 'rgba(0,0,0,.3)';
  mmCtx.fillRect(0,0,mw,mh);

  const allRects = roomRects.concat(corridorRects);
  const minX = Math.min(...allRects.map(r => r.minX));
  const maxX = Math.max(...allRects.map(r => r.maxX));
  const minZ = Math.min(...allRects.map(r => r.minZ));
  const maxZ = Math.max(...allRects.map(r => r.maxZ));
  const scale = Math.min((mw - 20) / (maxX - minX), (mh - 20) / (maxZ - minZ));
  const ox = (mw - (maxX - minX) * scale) / 2 - minX * scale;
  const oy = (mh - (maxZ - minZ) * scale) / 2 - minZ * scale;
  const mapX = x => ox + x * scale;
  const mapZ = z => oy + z * scale;

  // Draw corridors first, then rooms.
  corridorRects.forEach(r => {
    mmCtx.fillStyle = 'rgba(255,255,255,.05)';
    mmCtx.fillRect(mapX(r.minX), mapZ(r.minZ), (r.maxX-r.minX)*scale, (r.maxZ-r.minZ)*scale);
  });

  roomRects.forEach(r => {
    const rm = ROOMS[r.roomIdx];
    const x = mapX(r.minX);
    const y = mapZ(r.minZ);
    const rw = (r.maxX - r.minX) * scale;
    const rd = (r.maxZ - r.minZ) * scale;
    mmCtx.fillStyle = r.roomIdx === currentRoomIdx ? 'rgba(201,169,110,.3)' : 'rgba(255,255,255,.08)';
    mmCtx.fillRect(x, y, rw, rd);
    mmCtx.strokeStyle = 'rgba(201,169,110,.2)';
    mmCtx.strokeRect(x, y, rw, rd);
    mmCtx.fillStyle = 'rgba(201,169,110,.4)';
    mmCtx.font = '7px sans-serif';
    mmCtx.textAlign = 'center';
    mmCtx.fillText(rm.name, x + rw/2, y + rd/2 + 3);
  });

  // Player dot
  const camZ = camera.position.z;
  const camX = camera.position.x;
  const dotZ = mapZ(camZ);
  const dotX = mapX(camX);

  mmCtx.fillStyle = '#c9a96e';
  mmCtx.beginPath();
  mmCtx.arc(dotX, dotZ, 3, 0, Math.PI*2);
  mmCtx.fill();

  // Direction indicator
  const dx = -Math.sin(yaw) * 8;
  const dz = -Math.cos(yaw) * 8;
  mmCtx.strokeStyle = '#c9a96e';
  mmCtx.lineWidth = 1.5;
  mmCtx.beginPath();
  mmCtx.moveTo(dotX, dotZ);
  mmCtx.lineTo(dotX + dx, dotZ + dz);
  mmCtx.stroke();
}

// ============ ROOM TRACKING ============
function updateCurrentRoom() {
  for (const r of roomRects) {
    if (camera.position.x > r.minX && camera.position.x < r.maxX &&
        camera.position.z > r.minZ && camera.position.z < r.maxZ) {
      if (r.roomIdx !== currentRoomIdx) {
        currentRoomIdx = r.roomIdx;
        document.getElementById('rl-name').textContent = ROOMS[currentRoomIdx].name;
        document.getElementById('rl-sub').textContent = ROOMS[currentRoomIdx].sub;
      }
      break;
    }
  }
}

// ============ ANIMATION ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // Movement
  direction.set(0, 0, 0);
  if (moveState.f) direction.z -= 1;
  if (moveState.b) direction.z += 1;
  if (moveState.l) direction.x -= 1;
  if (moveState.r) direction.x += 1;
  direction.normalize();

  if (direction.length() > 0) {
    const moveX = direction.x * Math.cos(yaw) + direction.z * Math.sin(yaw);
    const moveZ = -direction.x * Math.sin(yaw) + direction.z * Math.cos(yaw);
    const newPos = camera.position.clone();
    newPos.x += moveX * speed * dt;
    newPos.z += moveZ * speed * dt;
    // Simple collision
    if (canMoveTo(newPos)) {
      camera.position.copy(newPos);
    }
  }

  updateCrosshair();
  updateCurrentRoom();
  drawMinimap();

  // Dust animation
  const dPos = dust.geometry.attributes.position.array;
  for (let i = 0; i < dustCount; i++) {
    dPos[i*3+1] += Math.sin(clock.elapsedTime + i) * 0.001;
    if (dPos[i*3+1] > 5) dPos[i*3+1] = 0;
  }
  dust.geometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}

// ============ INIT ============
loader.addEventListener('click', () => {
  loader.classList.add('fade');
  setTimeout(() => loader.style.display = 'none', 1000);
  overlay.classList.remove('hidden');
});

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
