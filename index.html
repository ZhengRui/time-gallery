<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沉浸式相册展览馆</title>
<style>
html,body{margin:0;background:#000;color:#f5f0e8;overflow:hidden}
#loader{position:fixed;inset:0;background:#060606;z-index:1000;display:flex;align-items:center;justify-content:center}
</style>
<link rel="stylesheet" href="/src/styles.css">
</head>
<body>

<div id="loader"><h1>Gallery</h1><p>点击进入展览馆</p></div>

<div id="overlay">
  <div class="inner">
    <h2>ENTER</h2>
    <p>点击任意位置进入展览馆</p>
    <div class="keys">
      <span class="desktop-help">
        W / ↑ — 前进 &nbsp;&nbsp; S / ↓ — 后退<br>
        A / ← — 左移 &nbsp;&nbsp; D / → — 右移<br>
        按住鼠标拖动 — 环顾四周<br>
        点击画框 — 查看详情
      </span>
      <span class="touch-help">
        左侧拖动 — 移动<br>
        右侧拖动 — 环顾四周<br>
        对准画框轻点 — 查看详情
      </span>
    </div>
  </div>
</div>

<div id="crosshair"></div>

<div id="hud">
  <div class="logo">Gallery Experience</div>
  <div class="room-label"><h3 id="rl-name">大厅</h3><p id="rl-sub">The Grand Hall</p></div>
</div>

<div id="photo-popup">
  <div class="pp-close" id="pp-close">✕</div>
  <canvas id="pp-cv" width="600" height="600"></canvas>
  <div class="pp-info"><h4 id="pp-title"></h4><p id="pp-desc"></p></div>
</div>

<div id="minimap"><canvas id="mm-cv" width="190" height="170"></canvas></div>

<div id="touch-controls" aria-hidden="true">
  <div id="touch-move" class="touch-joystick">
    <div id="touch-stick"></div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
