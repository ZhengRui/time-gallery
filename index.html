<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoarHigh Club Introduction Wing</title>
<style>
html,body{margin:0;background:#000;color:#f5f0e8;overflow:hidden}
#loader{position:fixed;inset:0;background:#060606;z-index:1000;display:flex;align-items:center;justify-content:center}
</style>
<link rel="stylesheet" href="/src/styles.css">
</head>
<body>

<div id="loader"><h1>SoarHigh</h1><p>Club Introduction Wing</p></div>

<div id="overlay">
  <div class="inner">
    <span>SoarHigh Toastmasters Club</span>
    <h2>Club Introduction Wing</h2>
    <p>Enter Gallery</p>
  </div>
</div>

<div id="crosshair"></div>

<div id="hud">
  <div class="logo">Club Introduction</div>
  <div class="room-label"><h3 id="rl-name">Toastmasters International</h3><p id="rl-sub">Global Communication Network</p></div>
</div>

<div id="presentation-hud">
  <span id="presentation-status">Guided intro</span>
  <b>Space / → next · ← previous · Esc exit</b>
</div>

<div id="photo-popup">
  <div class="pp-close" id="pp-close">✕</div>
  <canvas id="pp-cv" width="600" height="600"></canvas>
  <div class="pp-info"><h4 id="pp-title"></h4><p id="pp-desc"></p></div>
  <div class="pp-hint">Esc close</div>
</div>

<div id="minimap"><canvas id="mm-cv" width="190" height="170"></canvas></div>

<div id="touch-controls" aria-hidden="true">
  <div id="touch-move" class="touch-joystick">
    <div id="touch-stick"></div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
